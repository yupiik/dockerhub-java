name: DockerHub CI

# TAGs are exact version, includes base image (alpine) + app, ex: java/25.0.1-alpine3.23
# Branches are symlinks, includes app only, ex: java/25.0.1, java/25 etc... they are updated so prefer to use a sha256 ref to pin it
on:
  push:
    branches:
      - '*/[0-9]+.[0-9]+'
      - '*/[0-9]+.[0-9]+.[0-9]+'
    tags:
      # https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#filter-pattern-cheat-sheet
      - '*/[0-9]+.[0-9]+-alpine[0-9]+.[0-9]+'
      - '*/[0-9]+.[0-9]+.[0-9]+-alpine[0-9]+.[0-9]+'
      - '*/[0-9]+.[0-9]+-alpine[0-9]+.[0-9]+.[0-9]+'
      - '*/[0-9]+.[0-9]+.[0-9]+-alpine[0-9]+.[0-9]+.[0-9]+'

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Parsed tag
        id: parsed_tag
        run: |
          ref=${{ github.ref }}
          version=$(echo "$ref" |  cut -d '/' -f 4)
          image=$(echo "$ref" |  cut -d '/' -f 3)
          echo "::set-output name=image::$image"
          echo "::set-output name=version::$version"
          echo "Image=$image,Version=$version"

      - name: Login to DockerHub
        uses: docker/login-action@v1
        if: startsWith( github.ref, 'refs/tags/') || startsWith( github.ref, 'refs/heads/')
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v2
        if: startsWith( github.ref, 'refs/tags/') || startsWith( github.ref, 'refs/heads/')
        with:
          push: true
          context: ./${{ steps.parsed_tag.outputs.image }}
          file: ./${{ steps.parsed_tag.outputs.image }}/Dockerfile
          tags: ossyupiik/${{ steps.parsed_tag.outputs.image }}:${{ steps.parsed_tag.outputs.version }}
          labels: |
            org.opencontainers.image.vendor=Yupiik

      - name: Image Report
        run: echo ossyupiik/${{ steps.parsed_tag.outputs.image }}:${{ steps.parsed_tag.outputs.version }}@${{ steps.docker_build.outputs.digest }}
